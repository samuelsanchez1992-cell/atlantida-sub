<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso de Socios - Atlántida Sub</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            padding: 110px 20px 40px; /* Header is 70px + 40px gap = ~1cm */
            box-sizing: border-box;
            position: relative;
            z-index: 2;
        }
        .auth-panel {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            padding: 25px 35px 35px;
            text-align: center;
            border-radius: 20px;
            background: rgba(6, 14, 29, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 2px 10px rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .auth-logo {
            width: 80px;
            margin-bottom: 20px;
        }
        .auth-title {
            font-family: var(--font-title);
            font-size: 1.5rem;
            color: var(--color-white);
            margin-bottom: 15px;
            margin-top: 0;
        }
        .auth-form .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .auth-links {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            font-size: 0.9rem;
        }
        .auth-links a {
            color: var(--color-blue-light);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .auth-links a:hover {
            color: var(--color-orange);
        }
    </style>
</head>
<body class="dark-theme">
    <div class="background-wrapper">
        <div class="ambient-light light-1"></div>
        <div class="ambient-light light-2"></div>
        <div class="ambient-light light-3"></div>
    </div>
    
    <!-- Removed unstyled bubbles-container that caused layout shifts -->

    <!-- Header -->
    <header class="main-header" style="position: fixed; top: 0; width: 100%; z-index: 100; background: rgba(6, 14, 29, 0.8); border-bottom: 1px solid rgba(255,255,255,0.05);">
        <div class="container header-container" style="display: flex; justify-content: space-between; align-items: center; height: 70px;">
            <a href="index.html" class="logo">
                <img src="assets/logo.png" alt="Logo Atlántida Sub" class="logo-img">
                <div class="logo-text">
                    Atlántida <span class="highlight-orange">Sub</span>
                    <span class="logo-subtext">Club de Buceo</span>
                </div>
            </a>
            <a href="index.html" class="btn btn-primary btn-sm" style="display: inline-flex; align-items: center; background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); color: white;">
                <i data-lucide="arrow-left" style="width: 16px; height: 16px; margin-right: 6px;"></i>
                Volver a inicio
            </a>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-panel glass-panel">
            <img src="assets/logo.png" alt="Icono Club" style="width: 70px; display: block; margin: 0 auto 10px auto;">
            <h1 class="auth-title" style="color: var(--color-orange);">Acceso de Socios</h1>
            
            <form class="auth-form contact-form" action="#">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" style="width: 100%; margin-top: 10px;">Entrar</button>
            </form>
            
            <div class="auth-links">
                <a href="recuperar-password.html">¿Has olvidado tu contraseña?</a>
                <a href="index.html" style="color: var(--color-gray-light); font-size: 0.85rem;">← Volver al inicio</a>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
